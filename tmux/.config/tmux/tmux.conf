# reload conf to <leader>+r
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# set leader key to ctrl+space
set -g prefix C-Space

# mouse support
set -g mouse on

# movement set to <leader>+HJKL
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# other
set -a terminal-features "tmux-256color:RGB"
set -g base-index 1
set -g renumber-windows on
set -g mode-keys vi
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=default"
set -g window-status-current-style "fg=blue bold"
set -g status-right "#S "
set -g status-left " "

# other bindings
bind E show-environment -g

# make new window in cwd
bind c run-shell "tmux new-window -c '#{pane_current_path}'"

# Pane splits should open to the same path as the current pane
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# for tpm to correctly work:
# git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-dir '~/.config/tmux/resurrect'
set -g @continuum-restore 'on'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Initialize TMUX plugin manager
run '~/.config/tmux/plugins/tpm/tpm'
